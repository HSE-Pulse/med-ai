apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "medai-service.fullname" . }}
  labels:
    {{- include "medai-service.labels" . | nindent 4 }}
  annotations:
    # Linkerd sidecar injection
    linkerd.io/inject: {{ .Values.linkerd.inject | quote }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.service.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "medai-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "medai-service.selectorLabels" . | nindent 8 }}
      annotations:
        # Prometheus scrape (shared label all services)
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.service.port | quote }}
        # Linkerd — opt-in per pod
        linkerd.io/inject: {{ .Values.linkerd.inject | quote }}
        # Checksum ConfigMap so pods roll on config change
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: {{ .Values.service.name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - python
            - -m
            - uvicorn
            - {{ .Values.service.module | quote }}
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.service.port | quote }}
            - --proxy-headers
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "medai-service.fullname" . }}-env
            - secretRef:
                name: {{ .Values.secrets.mongoSecret }}
                optional: true
            - secretRef:
                name: {{ .Values.secrets.kafkaSecret }}
                optional: true
          env:
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.env.OTEL_SERVICE_NAME | default .Values.service.name | quote }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- toYaml .Values.volumeMounts | nindent 12 }}
      volumes:
        {{- toYaml .Values.volumes | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
