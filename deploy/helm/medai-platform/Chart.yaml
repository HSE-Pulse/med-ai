apiVersion: v2
name: medai-platform
description: |
  Umbrella chart that deploys the entire MedAI platform (17 services +
  infra) in one release. Depends on the medai-service chart for each
  microservice, plus the operators for MongoDB, Redpanda, Redis, and
  Linkerd.
type: application
version: 0.1.0
appVersion: "1.0.0"

# Each service is a dependency pinned to the same medai-service chart
# with a distinct values file. See charts/ below — the umbrella chart
# keeps the helm file hierarchy clean.
dependencies:
  - name: medai-service
    alias: ed-triage
    version: 0.1.0
    repository: "file://../medai-service"
  - name: medai-service
    alias: sepsis-icu
    version: 0.1.0
    repository: "file://../medai-service"
  - name: medai-service
    alias: hospital-ops
    version: 0.1.0
    repository: "file://../medai-service"
