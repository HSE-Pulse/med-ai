worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Docker's embedded DNS so backend hostnames re-resolve if a service
    # container is recreated. Without this nginx caches the first lookup
    # forever and starts 502'ing.
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    server {
        listen 3010;
        root /usr/share/nginx/html;
        index index.html;

        # FastAPI's Swagger UI / ReDoc hardcode an absolute openapi_url
        # (`/openapi.json`), which under the `/api/<svc>/` proxy resolves to the
        # dashboard SPA instead of the spec ("no valid version field"). Rewrite
        # it to a RELATIVE url so it resolves to `/api/<svc>/openapi.json` for
        # every service. Accept-Encoding is cleared so the upstream sends
        # uncompressed HTML that sub_filter can rewrite.
        proxy_set_header Accept-Encoding "";
        sub_filter_types text/html;
        sub_filter_once on;
        sub_filter "url: '/openapi.json'" "url: 'openapi.json'";
        sub_filter "spec-url=\"/openapi.json\"" "spec-url=\"openapi.json\"";

        # Order: longer/more-specific prefixes first so `/api/ed-flow/` is
        # not eaten by `/api/ed/`.
        # NOTE: upstream hostnames are held in a $var so nginx resolves them
        # LAZILY at request time via the `resolver` above — instead of resolving
        # every literal proxy_pass at boot and hard-crashing ([emerg] host not
        # found in upstream) on the first name the embedded DNS is briefly slow
        # on. Because proxy_pass now carries a variable, nginx no longer strips
        # the matched location prefix automatically, so each block does an
        # explicit `rewrite ... break` to reproduce the old trailing-slash strip.
        location /api/ed-flow/ { set $u ed_flow;          rewrite ^/api/ed-flow/(.*)$ /$1 break;          proxy_pass http://$u:8214; }
        location /api/ed/      { set $u ed_triage;        rewrite ^/api/ed/(.*)$ /$1 break;               proxy_pass http://$u:8201; }
        location /api/sepsis/  { set $u sepsis_icu;       rewrite ^/api/sepsis/(.*)$ /$1 break;           proxy_pass http://$u:8202; }
        location /api/ops/     { set $u hospital_ops;     rewrite ^/api/ops/(.*)$ /$1 break;              proxy_pass http://$u:8203; }
        location /api/onco/    { set $u oncology_ai;      rewrite ^/api/onco/(.*)$ /$1 break;             proxy_pass http://$u:8204; }
        location /api/journey/ { set $u patient_journey;  rewrite ^/api/journey/(.*)$ /$1 break;          proxy_pass http://$u:8205; }
        location /api/chat/    { set $u clinical_chat;    rewrite ^/api/chat/(.*)$ /$1 break;             proxy_pass http://$u:8206; }
        location /api/sim/ {
            set $u data_ingestion;
            rewrite ^/api/sim/(.*)$ /$1 break;
            proxy_pass http://$u:8207;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /api/beds/             { set $u bed_management;   rewrite ^/api/beds/(.*)$ /$1 break;             proxy_pass http://$u:8208; }
        location /api/waitlist/         { set $u waiting_list;     rewrite ^/api/waitlist/(.*)$ /$1 break;         proxy_pass http://$u:8209; }
        location /api/scribe/           { set $u clinical_scribe;  rewrite ^/api/scribe/(.*)$ /$1 break;           proxy_pass http://$u:8210; }
        location /api/erp/              { set $u erp;              rewrite ^/api/erp/(.*)$ /$1 break;              proxy_pass http://$u:8215; }
        location /api/trolley/          { set $u trolley_watch;    rewrite ^/api/trolley/(.*)$ /$1 break;          proxy_pass http://$u:8216; }
        location /api/gdpr/             { set $u gdpr;             rewrite ^/api/gdpr/(.*)$ /$1 break;             proxy_pass http://$u:8217; }
        location /api/xai/              { set $u xai;              rewrite ^/api/xai/(.*)$ /$1 break;              proxy_pass http://$u:8218; }
        location /api/fhir/             { set $u fhir;             rewrite ^/api/fhir/(.*)$ /$1 break;             proxy_pass http://$u:8219; }
        location /api/deterioration/    { set $u deterioration;    rewrite ^/api/deterioration/(.*)$ /$1 break;    proxy_pass http://$u:8220; }
        location /api/discharge-lounge/ { set $u discharge_lounge; rewrite ^/api/discharge-lounge/(.*)$ /$1 break; proxy_pass http://$u:8221; }

        # Alerts: HTTP + WebSocket on /alerts/stream
        location /api/alerts/ {
            set $u alerts;
            rewrite ^/api/alerts/(.*)$ /$1 break;
            proxy_pass http://$u:8222;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # SPA fallback — every non-asset route returns index.html so
        # React Router can take over client-side.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
