worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Docker's embedded DNS so backend hostnames re-resolve if a service
    # container is recreated. Without this nginx caches the first lookup
    # forever and starts 502'ing.
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    server {
        listen 3010;
        root /usr/share/nginx/html;
        index index.html;

        # Order: longer/more-specific prefixes first so `/api/ed-flow/` is
        # not eaten by `/api/ed/`.
        location /api/ed-flow/          { proxy_pass http://ed_flow:8214/; }
        location /api/ed/               { proxy_pass http://ed_triage:8201/; }
        location /api/sepsis/           { proxy_pass http://sepsis_icu:8202/; }
        location /api/ops/              { proxy_pass http://hospital_ops:8203/; }
        location /api/onco/             { proxy_pass http://oncology_ai:8204/; }
        location /api/journey/          { proxy_pass http://patient_journey:8205/; }
        location /api/chat/             { proxy_pass http://clinical_chat:8206/; }
        location /api/sim/ {
            proxy_pass http://data_ingestion:8207/;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /api/beds/             { proxy_pass http://bed_management:8208/; }
        location /api/waitlist/         { proxy_pass http://waiting_list:8209/; }
        location /api/scribe/           { proxy_pass http://clinical_scribe:8210/; }
        location /api/erp/              { proxy_pass http://erp:8215/; }
        location /api/trolley/          { proxy_pass http://trolley_watch:8216/; }
        location /api/gdpr/             { proxy_pass http://gdpr:8217/; }
        location /api/xai/              { proxy_pass http://xai:8218/; }
        location /api/fhir/             { proxy_pass http://fhir:8219/; }
        location /api/deterioration/    { proxy_pass http://deterioration:8220/; }
        location /api/discharge-lounge/ { proxy_pass http://discharge_lounge:8221/; }

        # Alerts: HTTP + WebSocket on /alerts/stream
        location /api/alerts/ {
            proxy_pass http://alerts:8222/;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # SPA fallback — every non-asset route returns index.html so
        # React Router can take over client-side.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
