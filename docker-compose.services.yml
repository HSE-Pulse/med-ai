  # ── Dashboard (nginx serving the vite build + reverse-proxy /api/*) ──
  # Source lives in ./dashboard/ — edits picked up by `docker compose
  # build dashboard` (rebuilds the bundle inside the image). The image
  # itself is nginx:1.27-alpine with dist baked in; no node at runtime.
  dashboard:
    image: hse-dashboard:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: hse-dashboard
    restart: unless-stopped
    networks: [cancer_default]
    ports: ["100.118.170.33:3010:3010"]

networks:
  cancer_default:
    external: true
