# Containerized backends + dashboard for the HSE/cancer stack.
#
# Run AFTER the 5 medai-* infra composes are up (they own cancer_default
# network and the cancer-mongo container):
#
#   docker compose -p cancer -f docker-compose.services.yml up -d
#
# Stop start_all.py on the host first (or its uvicorn workers will hold
# the 8201-8222 / 3010 ports and these containers can't bind).
#
# Cross-service URLs use docker-DNS service names (resolved on the
# cancer_default bridge). The dashboard's Vite proxy is overridden via
# VITE_*_URL env vars so it talks to sibling containers, not 127.0.0.1.

x-svc-env: &svc-env
  KAFKA_BOOTSTRAP: redpanda:9092
  MONGO_URI: mongodb://cancer-mongo:27017/
  MONGO_URL: mongodb://cancer-mongo:27017
  REDIS_URL: redis://redis:6379
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  LOKI_URL: http://loki:3100
  CUDA_VISIBLE_DEVICES: ""
  # Cross-service URLs — each backend resolves siblings by service name.
  ED_TRIAGE_URL: http://ed_triage:8201
  SEPSIS_ICU_URL: http://sepsis_icu:8202
  HOSPITAL_OPS_URL: http://hospital_ops:8203
  ONCOLOGY_AI_URL: http://oncology_ai:8204
  PATIENT_JOURNEY_URL: http://patient_journey:8205
  CLINICAL_CHAT_URL: http://clinical_chat:8206
  DATA_INGESTION_URL: http://data_ingestion:8207
  BED_MANAGEMENT_URL: http://bed_management:8208
  WAITING_LIST_URL: http://waiting_list:8209
  CLINICAL_SCRIBE_URL: http://clinical_scribe:8210
  ED_FLOW_URL: http://ed_flow:8214
  ERP_URL: http://erp:8215
  TROLLEY_WATCH_URL: http://trolley_watch:8216
  GDPR_URL: http://gdpr:8217
  XAI_URL: http://xai:8218
  FHIR_URL: http://fhir:8219
  DETERIORATION_URL: http://deterioration:8220
  DISCHARGE_LOUNGE_URL: http://discharge_lounge:8221
  ALERTS_URL: http://alerts:8222

x-svc-volumes: &svc-volumes
  - ./models:/models:ro
  - ./datasets:/datasets:ro

x-svc-defaults: &svc-defaults
  restart: unless-stopped
  networks: [cancer_default]
  volumes: *svc-volumes
  # No depends_on for cancer-mongo / medai-redpanda — those containers
  # are owned by separate compose files / docker run, so referencing
  # them here would be "undefined service" errors. The services have
  # their own connect-retry against Mongo + Kafka.

services:
  # ── 19 backend services ──────────────────────────────────────────────
  ed_triage:
    <<: *svc-defaults
    image: hse-svc-ed_triage:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.service
      args: { APP: app_01_ed_triage, MODULE_PATH: app_01_ed_triage.backend.app.main:app, PORT: 8201 }
    container_name: hse-ed_triage
    environment:
      <<: *svc-env
      MODEL_DIR: /models/ed_triage
      DATASET_DIR: /datasets/ed_triage
    ports: ["100.118.170.33:8201:8201"]

  sepsis_icu:
    <<: *svc-defaults
    image: hse-svc-sepsis_icu:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.service
